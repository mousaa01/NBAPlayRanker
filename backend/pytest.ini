# backend/pytest.ini
#
# Pytest configuration for the backend test suite.
#
# Running from the repo root:
#   pytest backend/tests/ -v                   (all tests)
#   pytest backend/tests/ -v -m "not integration"   (unit tests only, fast)
#   pytest backend/tests/ -v -m integration         (integration tests, slow)
#
# Running from backend/:
#   pytest -v

[pytest]
testpaths = tests
markers =
    integration: tests that load real CSV/parquet data and train models (slow)
